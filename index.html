<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoteVerse: City of Democracy</title>
    <meta name="description" content="An interactive civic education RPG — explore 5 city zones, meet AI-powered NPCs, and shape Indian democracy." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #030508; }
      #root { width: 100%; height: 100%; }

      /* ── CORE GAME DESIGN TOKENS ── */
      :root {
        --bg-void:       #030508;
        --bg-base:       #080A11;
        --bg-surface:    #0F1523;
        --bg-elevated:   #161F33;

        --text-primary:  #F0F4F8;
        --text-secondary:#A0ABC0;
        --text-muted:    #5A6B8A;

        --cyan:          #00E5FF;
        --cyan-dim:      rgba(0,229,255,0.15);
        --cyan-glow:     rgba(0,229,255,0.4);
        --purple:        #B042FF;
        --purple-light:  #D082FF;
        --saffron:       #FFB800;
        --saffron-dim:   rgba(255,184,0,0.15);
        --saffron-glow:  rgba(255,184,0,0.4);

        --success:       #00FF88;
        --warning:       #FFB800;
        --danger:        #FF3366;

        --panel-bg:      rgba(8,10,17,0.88);
        --panel-border:  rgba(0,229,255,0.25);
        --panel-shadow:  0 8px 40px rgba(0,0,0,0.85), 0 0 0 1px rgba(0,229,255,0.1) inset;

        --r-sm: 4px;
        --r-md: 8px;
        --r-lg: 12px;

        --ease-out: cubic-bezier(0.16, 1, 0.3, 1);

        /* Legacy compat for onboarding screens */
        --teal:              #00E5FF;
        --teal-light:        #4AF0FF;
        --teal-dim:          rgba(0,229,255,0.15);
        --india-green:       #00FF88;
        --india-green-light: #50FFA0;
      }

      /* ── SCROLLBAR ── */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-thumb { background: rgba(0,229,255,0.25); border-radius: 4px; }

      /* ── TYPOGRAPHY ── */
      body { font-family: 'Inter', system-ui, sans-serif; color: var(--text-primary); -webkit-font-smoothing: antialiased; }
      .font-display { font-family: 'Orbitron', sans-serif !important; }
      .font-ui      { font-family: 'Inter', system-ui, sans-serif !important; }
      .font-mono    { font-family: 'Rajdhani', sans-serif !important; font-weight: 600; }

      /* ── KEYFRAMES ── */
      @keyframes fade-up   { from { opacity:0; transform:translateY(16px) } to { opacity:1; transform:translateY(0) } }
      @keyframes slide-left{ from { opacity:0; transform:translateX(24px) } to { opacity:1; transform:translateX(0) } }
      @keyframes slide-up  { from { opacity:0; transform:translateY(32px) } to { opacity:1; transform:translateY(0) } }
      @keyframes shimmer   { 0% { background-position:-200% center } 100% { background-position:200% center } }
      @keyframes pulse-soft{
        0%,100% { opacity:1; }
        50%      { opacity:0.55; }
      }
      @keyframes border-glow {
        0%,100% { box-shadow: 0 0 0 1px rgba(0,229,255,0.35), 0 0 15px rgba(0,229,255,0.1); }
        50%      { box-shadow: 0 0 0 1px rgba(0,229,255,0.85), 0 0 28px rgba(0,229,255,0.3); }
      }

      /* ── ANIMATION UTILITIES ── */
      .anim-fade-up   { animation: fade-up    0.5s var(--ease-out) both; }
      .anim-slide-left{ animation: slide-left 0.45s var(--ease-out) both; }
      .anim-slide-up  { animation: slide-up   0.4s var(--ease-out) both; }
      .anim-pulse     { animation: pulse-soft 2s ease-in-out infinite; }

      /* ── PANEL / GLASS ── */
      .panel {
        background: var(--panel-bg);
        backdrop-filter: blur(28px) saturate(160%);
        -webkit-backdrop-filter: blur(28px) saturate(160%);
        border: 1px solid var(--panel-border);
        box-shadow: var(--panel-shadow);
      }

      /* ── METER BAR ── */
      .meter-track {
        background: rgba(15,21,35,0.9);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 2px;
        overflow: hidden;
      }
      .meter-fill {
        height: 100%;
        border-radius: 1px;
        transition: width 0.8s var(--ease-out);
        position: relative;
      }
      .meter-fill::after {
        content:'';
        position: absolute; inset: 0;
        background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.3) 50%, transparent 100%);
        background-size: 200% 100%;
        animation: shimmer 2s linear infinite;
      }

      /* ── CTA BUTTON ── */
      .btn-cta {
        background: rgba(0,229,255,0.08);
        color: var(--cyan);
        font-family: 'Orbitron', sans-serif;
        font-weight: 700;
        letter-spacing: 0.15em;
        border: 1px solid var(--cyan);
        cursor: pointer;
        transition: all 0.25s var(--ease-out);
        box-shadow: 0 0 12px rgba(0,229,255,0.2), inset 0 0 12px rgba(0,229,255,0.08);
        text-transform: uppercase;
      }
      .btn-cta:hover:not(:disabled) {
        background: rgba(0,229,255,0.18);
        box-shadow: 0 0 24px rgba(0,229,255,0.45), inset 0 0 20px rgba(0,229,255,0.15);
        text-shadow: 0 0 10px var(--cyan);
      }
      .btn-cta:disabled { opacity:0.3; border-color:var(--text-muted); color:var(--text-muted); box-shadow:none; cursor:not-allowed; }

      /* ── GHOST BUTTON ── */
      .btn-ghost {
        background: transparent;
        color: var(--text-secondary);
        border: 1px solid rgba(255,255,255,0.12);
        cursor: pointer;
        transition: all 0.2s ease;
        font-family: 'Inter', sans-serif;
      }
      .btn-ghost:hover { border-color: var(--cyan); color: var(--cyan); background: rgba(0,229,255,0.06); }

      /* ── INPUT ── */
      .input-field {
        background: rgba(3,5,8,0.85);
        border: 1px solid rgba(0,229,255,0.25);
        color: var(--text-primary);
        font-family: 'Rajdhani', sans-serif;
        font-weight: 600;
        outline: none;
        transition: all 0.2s ease;
      }
      .input-field:focus { border-color: var(--cyan); box-shadow: 0 0 14px rgba(0,229,255,0.2); }
      .input-field::placeholder { color: var(--text-muted); font-weight: 400; }

      /* ── CHOICE BUTTON ── */
      .choice-btn {
        background: rgba(15,21,35,0.7);
        border: 1px solid rgba(0,229,255,0.12);
        border-left: 3px solid rgba(0,229,255,0.35);
        color: var(--text-secondary);
        font-family: 'Inter', sans-serif;
        text-align: left;
        cursor: pointer;
        transition: all 0.2s var(--ease-out);
      }
      .choice-btn:hover:not(:disabled) {
        background: rgba(0,229,255,0.09);
        border-color: rgba(0,229,255,0.5);
        border-left-color: var(--cyan);
        color: var(--text-primary);
        box-shadow: 0 4px 16px rgba(0,229,255,0.12);
      }
      .choice-btn:disabled { opacity:0.35; cursor:not-allowed; border-left-color:var(--text-muted); }

      /* ── HUD CHIP ── */
      .hud-chip {
        background: rgba(8,10,17,0.9);
        border: 1px solid rgba(0,229,255,0.18);
        backdrop-filter: blur(16px);
        box-shadow: 0 2px 12px rgba(0,0,0,0.6), inset 0 1px 0 rgba(0,229,255,0.07);
      }

      /* ── TECH STRIPE ── */
      .tech-stripe {
        background: linear-gradient(90deg, transparent 0%, var(--cyan) 50%, transparent 100%);
        opacity: 0.6;
      }

      /* ── SCROLL REGION ── */
      .scroll-region {
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: rgba(0,229,255,0.2) transparent;
      }

      /* ── ZONE MARKER ── */
      .zone-marker-active { animation: border-glow 2s ease-in-out infinite; }

      /* ── INDIA STRIPE (onboarding only) ── */
      .india-stripe {
        background: linear-gradient(90deg, #FF9933 33.33%, #ffffff 33.33% 66.66%, #138808 66.66%);
      }

      /* ── SAFFRON TEXT ── */
      .saffron-text {
        background: linear-gradient(135deg,#FFD000,#FFB800 50%,#FF8800);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .cyan-text {
        background: linear-gradient(135deg,#00E5FF,#0088FF);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
